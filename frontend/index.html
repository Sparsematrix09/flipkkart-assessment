<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipkart Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'flipkart-blue': '#2874f0',
              'flipkart-orange': '#fb641b',
              'flipkart-yellow': '#ff9f00',
              'flipkart-green': '#388e3c',
              'flipkart-gray': '#f1f3f6',
              'flipkart-text': '#878787',
            },
            fontFamily: {
              'flipkart': ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            },
            boxShadow: {
              'flipkart': '0 2px 4px 0 rgba(0,0,0,.08)',
              'flipkart-hover': '0 4px 12px 0 rgba(0,0,0,.12)',
            }
          }
        }
      }
    </script>
    <style>
      .product-card {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .product-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 4px 12px 0 rgba(0,0,0,.12);
      }
      .carousel-button {
        transition: all 0.2s ease;
      }
      .carousel-button:hover {
        background-color: #2874f0;
        color: white;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-flipkart-gray font-flipkart">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
